<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invariant Foundation | The Determinism Standard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;500;700&display=swap');

    :root {
      --bg-primary: #050505;
      --bg-secondary: #0a0a0a;
      --text-primary: #FFFFFF;
      --text-secondary: #888888;
      --border: rgba(255, 255, 255, 0.1);
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    /* Cinematic Noise */
    .noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E'); }

    /* OS Core Wrapper for Spatial Scaling */
    #os-core { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease, opacity 0.6s ease; transform-origin: center top; min-height: 100vh; background-color: var(--bg-primary); }
    body.app-open #os-core { transform: scale(0.95) translateY(2vh); filter: blur(10px) brightness(0.6); pointer-events: none; }

    h1, h2, h3, h4 { font-family: var(--font-heading); text-transform: uppercase; letter-spacing: -0.03em; font-weight: 900; line-height: 1.1; margin-bottom: 0.5em; }

    .title-monolith { font-size: clamp(1.5rem, 5vw, 5rem); line-height: 0.95; color: var(--text-primary); max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; text-shadow: 0 4px 24px rgba(0,0,0,0.5); word-break: break-word; text-align: center; }
    .text-stark { font-family: var(--font-body); font-size: clamp(1.2rem, 2vw, 1.5rem); color: var(--text-secondary); font-weight: 400; max-width: 800px; }
    .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 10; }
    .section { padding: 160px 0; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
    .section-dark { background-color: var(--bg-primary); }
    .section-light { background-color: var(--text-primary); color: var(--bg-primary); }
    .section-light h2 { color: var(--bg-primary); }

    /* Scroll Reveals */
    .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); will-change: opacity, transform; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* Ken Burns Hero */
    .hero-sec { min-height: 100vh; display: flex; align-items: center; padding-top: 120px; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-size: cover; background-position: center; opacity: 0; animation: kenburns 24s infinite; }
    .hero-bg:nth-child(1) { background-image: url('/assets/hero_bg_1.png'); animation-delay: 0s; }
    .hero-bg:nth-child(2) { background-image: url('/assets/hero_bg_2.png'); animation-delay: 8s; }
    .hero-bg:nth-child(3) { background-image: url('/assets/hero_bg_3.png'); animation-delay: 16s; }
    .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(5,5,5,0.4), var(--bg-primary)); z-index: 2; }

    @keyframes kenburns {
      0% { opacity: 0; transform: scale(1); }
      10% { opacity: 1; }
      25% { opacity: 1; }
      33% { opacity: 0; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.05); }
    }

    /* Apex Carousel */
    .carousel-track { display: flex; gap: 24px; overflow-x: auto; padding: 40px 0 20px 0; scroll-snap-type: x mandatory; margin: 0; width: 100%; perspective: 1000px; scrollbar-width: none; -ms-overflow-style: none; }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-nav { display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 20px; }
    .carousel-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.3s; font-size: 1.2rem; }
    .carousel-btn:hover { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
    .carousel-dots { display: flex; gap: 12px; }
    .dot { width: 8px; height: 8px; background: var(--border); border-radius: 50%; cursor: pointer; transition: all 0.3s; }
    .dot.active { background: var(--text-primary); transform: scale(1.5); }

    .carousel-card { flex: 0 0 min(85vw, 400px); scroll-snap-align: center; background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; cursor: pointer; display: flex; flex-direction: column; text-decoration: none; position: relative; overflow: hidden; transform-style: preserve-3d; will-change: transform; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .card-inner { pointer-events: none; display: flex; flex-direction: column; height: 100%; transform: translateZ(30px); }
    .card-img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(100%) contrast(1.1); transition: filter 0.5s ease; border-bottom: 1px solid var(--border); }
    .carousel-card:hover .card-img { filter: grayscale(0%) contrast(1.1); }
    .card-content { padding: 40px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; background: linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,1) 100%); }
    .card-title { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; color: var(--text-primary); transition: color 0.3s ease; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
    .card-desc { font-family: var(--font-body); font-size: 1.1rem; color: var(--text-secondary); line-height: 1.6; }
    .card-bot { font-family: var(--font-heading); font-weight: 800; font-size: 1.1rem; margin-top: 40px; display: flex; justify-content: space-between; color: var(--text-secondary); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.1em; }
    .carousel-card:hover .card-bot { color: var(--text-primary); transform: translateX(8px); }

    .btn-brutal { display: inline-block; background-color: transparent; color: var(--text-primary); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 16px 48px; font-family: var(--font-heading); font-size: 1.25rem; font-weight: 800; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 10; border-radius: 2px; }
    .btn-brutal:hover { background-color: var(--text-primary); color: var(--bg-primary); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }

    /* Spatial App Shell Overlay */
    #app-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 9999; display: none; flex-direction: column; opacity: 0; transition: opacity 0.5s ease; border: 1px solid rgba(255,255,255,0.05); }
    #app-overlay.active { display: flex; opacity: 1; }
    .overlay-header { height: 64px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(5,5,5,0.5); backdrop-filter: blur(20px); }
    .overlay-title { font-family: var(--font-heading); font-weight: 800; letter-spacing: 0.1em; font-size: 1rem; color: var(--text-primary); display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 8px; height: 8px; background-color: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; }
    .close-btn { color: var(--text-primary); background: transparent; border: 1px solid rgba(255,255,255,0.2); font-family: var(--font-heading); font-weight: 800; padding: 8px 24px; cursor: pointer; transition: all 0.3s ease; border-radius: 2px; letter-spacing: 0.05em; }
    .close-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); transform: scale(1.05); }
    #app-iframe { flex-grow: 1; width: 100%; border: none; background: #000; box-shadow: inset 0 0 50px rgba(0,0,0,1); }
  </style>
</head>
<body>
  <script>
    const ENGINE_MAP = {
      'lume':           { url: 'https://lume-lang.org',              title: 'LUME LANGUAGE' },
      'lumev':          { url: 'https://lumev.tlid.io',              title: 'LUME-V' },
      'hydrocore':      { url: 'https://hydrocore.dev',              title: 'HYDROCORE' },
      'meridian':       { url: 'https://meridiancanon.com',          title: 'MERIDIAN' },
      'fla':            { url: 'https://fla.tlid.io',                title: 'FRACTAL LEDGER' },
      'biocore':        { url: '/dist/biocore/engine.html',          title: 'BIOCORE' },
      'governancecore': { url: '/dist/governancecore/engine.html',   title: 'GOVERNANCECORE' },
      'neurocore':      { url: '/dist/neurocore/engine.html',        title: 'NEUROCORE' },
      'sociocore':      { url: '/dist/sociocore/engine.html',        title: 'SOCIOCORE' },
      'verdara':        { url: '/dist/verdara/verdara.js',           title: 'VERDARA' },
    };
    function openApp(url, title) {
      const iframe = document.getElementById('app-iframe');
      const isExternal = url.startsWith('http');
      iframe.src = url;
      document.getElementById('overlay-title').textContent = title;
      document.getElementById('app-overlay').classList.add('active');
      document.body.classList.add('app-open');
      const key = Object.keys(ENGINE_MAP).find(k => ENGINE_MAP[k].title === title) || '';
      if (key) window.location.hash = key;
      if (isExternal) {
        iframe.onload = () => {
          try {
            const doc = iframe.contentDocument;
            if (!doc || doc.URL === 'about:blank') throw new Error('blocked');
          } catch(e) {
            showExternalFallback(url, title);
          }
        };
      }
    }
    function showExternalFallback(url, title) {
      document.getElementById('app-iframe').srcdoc = `
        <html><body style="margin:0;background:#050505;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Inter',sans-serif;flex-direction:column;gap:24px;">
          <div style="color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;">${title}</div>
          <a href="${url}" target="_blank" style="background:#fff;color:#000;padding:12px 28px;border-radius:2px;text-decoration:none;font-weight:700;font-size:13px;letter-spacing:0.05em;text-transform:uppercase;">Open ${title} →</a>
          <div style="color:rgba(255,255,255,0.15);font-size:10px;">${url}</div>
        </body></html>`;
    }
    function closeApp() {
      document.getElementById('app-overlay').classList.remove('active');
      document.body.classList.remove('app-open');
      setTimeout(() => { document.getElementById('app-iframe').src = 'about:blank'; }, 500);
      history.pushState('', document.title, window.location.pathname);
    }
    // Auto-launch from hash on page load
    window.addEventListener('load', () => {
      const hash = window.location.hash.slice(1);
      if (hash && ENGINE_MAP[hash]) {
        const e = ENGINE_MAP[hash];
        openApp(e.url, e.title);
      }
    });

    // ── Invariant Cross-Core Signal Bus ──
    const InvariantBus = {
      _listeners: {}, _state: {},
      publish(core, nodeId, value) {
        this._state[core + ':' + nodeId] = value;
        (this._listeners[core + ':' + nodeId] || []).forEach(fn => fn(value, core, nodeId));
        (this._listeners['*'] || []).forEach(fn => fn(value, core, nodeId));
      },
      subscribe(core, nodeId, fn) {
        const key = core + ':' + nodeId;
        if (!this._listeners[key]) this._listeners[key] = [];
        this._listeners[key].push(fn);
      },
      subscribeAll(fn) {
        if (!this._listeners['*']) this._listeners['*'] = [];
        this._listeners['*'].push(fn);
      }
    };
    window.InvariantBus = InvariantBus;
    // ── Cross-Core Status Bar ──
    function buildStatusBar() {
      const bar = document.createElement('div');
      bar.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;height:32px;background:rgba(5,5,5,0.96);border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;gap:32px;z-index:10000;font-family:"Inter",sans-serif;font-size:10px;letter-spacing:0.1em;';
      const cores = [
        { key: 'LUME',           label: 'LUME',       static: true },
        { key: 'LUMEV',          label: 'LUME-V',     static: true },
        { key: 'HYDROCORE',      label: 'HYDROCORE',  static: true },
        { key: 'MERIDIAN',       label: 'MERIDIAN',   static: true },
        { key: 'FLA',            label: 'FLA',        static: true },
        { key: 'BIOCORE',        label: 'BIOCORE',    static: false },
        { key: 'GOVERNANCECORE', label: 'GOVERNANCE', static: false },
        { key: 'NEUROCORE',      label: 'NEURO',      static: false },
        { key: 'SOCIOCORE',      label: 'SOCIO',      static: false },
      ];
      const indicators = {};
      cores.forEach(core => {
        const item = document.createElement('div');
        item.style.cssText = 'display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.25);cursor:pointer;transition:color 0.3s;';
        const dot = document.createElement('div');
        dot.style.cssText = 'width:6px;height:6px;border-radius:50%;background:#222;transition:background 0.5s,box-shadow 0.5s;';
        const label = document.createElement('span');
        label.textContent = core.label;
        item.appendChild(dot);
        item.appendChild(label);
        item.addEventListener('click', () => {
          const mapKey = core.key.toLowerCase().replace('governancecore','governancecore');
          const e = ENGINE_MAP[mapKey] || ENGINE_MAP[core.key.toLowerCase()];
          if (e) openApp(e.url, e.title);
        });
        bar.appendChild(item);
        indicators[core.key] = dot;
        if (core.static) {
          setTimeout(() => {
            dot.style.background = '#22c55e';
            dot.style.boxShadow = '0 0 6px #22c55e';
          }, 800);
        }
      });
      document.body.appendChild(bar);
      InvariantBus.subscribeAll((value, core) => {
        const key = core.toUpperCase();
        if (!indicators[key]) return;
        const color = value >= 70 ? '#22c55e' : value >= 40 ? '#f59e0b' : '#ef4444';
        indicators[key].style.background = color;
        indicators[key].style.boxShadow = `0 0 6px ${color}`;
      });
    }
    buildStatusBar();

    // Scroll Reveal Observer
    document.addEventListener('DOMContentLoaded', () => {
      const reveals = document.querySelectorAll('.reveal');
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
      
      reveals.forEach(r => revealObserver.observe(r));

      // 3D Parallax Tilt for Cards
      const cards = document.querySelectorAll('.carousel-card');
      cards.forEach(card => {
        card.addEventListener('mousemove', e => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -5;
          const rotateY = ((x - centerX) / centerX) * 5;
          card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
          card.style.boxShadow = `${-rotateY * 2}px ${rotateX * 2 + 10}px 30px rgba(255,255,255,0.05)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
          card.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
        });
      });
      
      // Auto-trigger first reveals
      setTimeout(() => {
          reveals.forEach(r => {
              const rect = r.getBoundingClientRect();
              if(rect.top < window.innerHeight) { r.classList.add('active'); }
          });
      }, 100);

      // Carousel Navigation Logic
      setTimeout(() => {
          const track = document.querySelector('.carousel-track');
          const btnPrev = document.getElementById('btn-prev');
          const btnNext = document.getElementById('btn-next');
          const dotsWrap = document.getElementById('carousel-dots');
          const cards = document.querySelectorAll('.carousel-card');

          if (track && btnPrev && btnNext && dotsWrap && cards.length > 0) {
              cards.forEach((card, i) => {
                  const dot = document.createElement('div');
                  dot.className = i === 0 ? 'dot active' : 'dot';
                  dot.addEventListener('click', () => {
                      track.scrollTo({ left: card.offsetLeft - track.offsetLeft, behavior: 'smooth' });
                  });
                  dotsWrap.appendChild(dot);
              });

              const scrollAmount = cards[0].offsetWidth + 24; // Card width + gap

              btnPrev.addEventListener('click', () => {
                  track.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
              });

              btnNext.addEventListener('click', () => {
                  track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
              });

              track.addEventListener('scroll', () => {
                  const index = Math.round(track.scrollLeft / scrollAmount);
                  document.querySelectorAll('.dot').forEach((dot, i) => {
                      dot.className = i === index ? 'dot active' : 'dot';
                  });
              });
          }
      }, 500); // Small delay to let Lume DOM inject
    });
  </script>
  <script src="/dist/dwsc.js"></script>
</body>
</html>
