<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BioCore | Telemetry Engine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #020202;
      --panel: #0a0a0c;
      --border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --text-muted: #666;
      --optimal: #38bdf8;
      --caution: #f59e0b;
      --critical: #ef4444;
      --font-ui: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); padding: 32px; overflow-x: hidden; }

    .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 32px; }
    .title { font-size: 2rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
    .subtitle { font-size: 1rem; color: var(--text-muted); }
    .live-indicator { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--optimal); }
    .dot { width: 8px; height: 8px; background: var(--optimal); border-radius: 50%; animation: pulse 1s infinite; box-shadow: 0 0 10px var(--optimal); }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    
    .node-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
    .node-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--optimal); transition: background 0.3s; }
    .node-card.caution::before { background: var(--caution); }
    .node-card.critical::before { background: var(--critical); }

    .node-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .node-id { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-muted); }
    .node-name { font-size: 1.1rem; font-weight: 600; margin-top: 4px; }
    
    .node-data { display: flex; justify-content: space-between; align-items: flex-end; font-family: var(--font-mono); }
    .node-value { font-size: 2.5rem; font-weight: 700; line-height: 1; transition: color 0.3s; }
    .node-metric { font-size: 0.9rem; color: var(--text-muted); padding-bottom: 4px; }

    .chart { height: 40px; width: 100%; margin-top: 16px; display: flex; align-items: flex-end; gap: 2px; }
    .bar { flex: 1; background: var(--border); transition: height 0.2s ease, background 0.3s ease; }
    .bar.active { background: var(--optimal); }
    .node-card.caution .bar.active { background: var(--caution); }
    .node-card.critical .bar.active { background: var(--critical); }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title" id="primitive-title">LOADING...</div>
      <div class="subtitle" id="primitive-desc">Initializing Telemetry Stream</div>
    </div>
    <div class="live-indicator">
      <div class="dot"></div> LIVE DATALINK
    </div>
  </div>

  <div class="grid" id="node-grid"></div>

  <script>
    const biocoreData = {
      primitives: [
        { name: "Metabolic", desc: "Metabolic Flow / Nutrient and Energy Conversion", nodes: [
          { id: "M1", name: "Basal Energy Level" }, { id: "M2", name: "Glucose Stability" }, { id: "M3", name: "Nutrient Sufficiency" }, { id: "M4", name: "Metabolic Flexibility" }, { id: "M5", name: "Digestive Stability" }, { id: "M6", name: "Appetite Regulation" }, { id: "M7", name: "Weight Stability" }, { id: "M8", name: "Inflammation Load" }, { id: "M9", name: "Oxidative Stress" }, { id: "M10", name: "Metabolic Recovery" }
        ]},
        { name: "Circulatory", desc: "Cardiovascular Flow / Fluid Pressure Governance", nodes: [
          { id: "C1", name: "Resting Heart Rate" }, { id: "C2", name: "Heart Rate Variability" }, { id: "C3", name: "Blood Pressure" }, { id: "C4", name: "Peripheral Circulation" }, { id: "C5", name: "Oxygenation (SpO2)" }, { id: "C6", name: "Hydration Level" }, { id: "C7", name: "Electrolyte Balance" }, { id: "C8", name: "Circulatory Load" }, { id: "C9", name: "Fluid Retention" }, { id: "C10", name: "Recovery Speed" }
        ]},
        { name: "Neurological", desc: "Cognitive Flow / Synaptic Routing", nodes: [
          { id: "N1", name: "Sleep Duration" }, { id: "N2", name: "Sleep Quality" }, { id: "N3", name: "Circadian Alignment" }, { id: "N4", name: "Cognitive Clarity" }, { id: "N5", name: "Emotional Stability" }, { id: "N6", name: "Autonomic Balance" }, { id: "N7", name: "Anxiety Load" }, { id: "N8", name: "Depression Load" }, { id: "N9", name: "Sensory Overload" }, { id: "N10", name: "Social Connection" }, { id: "N11", name: "Neural Recovery" }
        ]},
        { name: "Thermal", desc: "Stress/Thermal Flow / Inflammatory Resilience", nodes: [
          { id: "S1", name: "Acute Stress Load" }, { id: "S2", name: "Chronic Stress Load" }, { id: "S3", name: "Inflammation Spike Risk" }, { id: "S4", name: "Body Temp Stability" }, { id: "S5", name: "Overtraining Risk" }, { id: "S6", name: "Burnout Risk" }, { id: "S7", name: "Immune Activation" }, { id: "S8", name: "Recovery Debt" }, { id: "S9", name: "Circadian Stress" }, { id: "S10", name: "Healing Momentum" }, { id: "S11", name: "Resilience Index" }
        ]}
      ]
    };

    const urlParams = new URLSearchParams(window.location.search);
    const primitiveKey = urlParams.get('primitive') || 'Metabolic';
    const primitive = biocoreData.primitives.find(p => p.name === primitiveKey);

    document.getElementById('primitive-title').innerText = primitive.name.toUpperCase() + " FLOW";
    document.getElementById('primitive-desc').innerText = primitive.desc;

    const grid = document.getElementById('node-grid');
    const nodesState = {};

    // Initialize Grid
    primitive.nodes.forEach(node => {
      // Starting state
      nodesState[node.id] = {
        val: 90 + Math.random() * 8, // 90-98%
        history: Array(20).fill(50)
      };

      const el = document.createElement('div');
      el.className = 'node-card';
      el.id = 'card-' + node.id;
      
      let bars = '';
      for(let i=0; i<20; i++) bars += `<div class="bar" id="bar-${node.id}-${i}"></div>`;

      el.innerHTML = `
        <div class="node-header">
          <div>
            <div class="node-id">${node.id}</div>
            <div class="node-name">${node.name}</div>
          </div>
        </div>
        <div class="node-data">
          <div class="node-value" id="val-${node.id}">--</div>
          <div class="node-metric">% CAP</div>
        </div>
        <div class="chart">${bars}</div>
      `;
      grid.appendChild(el);
    });

    // Telemetry Simulation Engine
    setInterval(() => {
      primitive.nodes.forEach(node => {
        const state = nodesState[node.id];
        
        // Random walk simulation
        const delta = (Math.random() - 0.45) * 4; 
        state.val = Math.max(10, Math.min(100, state.val + delta));
        
        // Update history
        state.history.shift();
        state.history.push(state.val);

        // Update UI
        const valEl = document.getElementById('val-' + node.id);
        const cardEl = document.getElementById('card-' + node.id);
        
        valEl.innerText = state.val.toFixed(1);

        // Status thresholds
        cardEl.className = 'node-card';
        if (state.val < 40) {
          cardEl.classList.add('critical');
          valEl.style.color = 'var(--critical)';
        } else if (state.val < 70) {
          cardEl.classList.add('caution');
          valEl.style.color = 'var(--caution)';
        } else {
          valEl.style.color = 'var(--optimal)';
        }

        // Update bars
        for(let i=0; i<20; i++) {
          const bar = document.getElementById(`bar-${node.id}-${i}`);
          bar.style.height = state.history[i] + '%';
          bar.className = 'bar active';
        }
      });
    }, 1000);
  </script>
</body>
</html>
