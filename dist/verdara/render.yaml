services:
  - type: web
    name: verdara-ultra
    runtime: static
    buildCommand: node build.js
    staticPublishPath: ./
    envVars:
      - key: NODE_VERSION
        value: 20
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
